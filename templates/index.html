<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAQR — Automated Trading</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

:root{
--bg:#000;
--surface:rgba(255,255,255,0.03);
--border:rgba(255,255,255,0.06);
--text:#fff;
--dim:#555;
--accent:#00ff88;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Inter',-apple-system,sans-serif;
background:var(--bg);
color:var(--text);
min-height:100vh;
-webkit-font-smoothing:antialiased;
}

.container{
max-width:480px;
margin:0 auto;
padding:40px 24px;
}

/* Logo */
.logo{
font-size:24px;
font-weight:900;
letter-spacing:-1px;
margin-bottom:48px;
}
.logo span{color:var(--accent)}

/* Hero */
.hero{margin-bottom:48px}
.hero h1{
font-size:44px;
font-weight:900;
line-height:1.1;
letter-spacing:-2px;
margin-bottom:16px;
}
.hero h1 span{color:var(--accent)}
.hero p{
font-size:16px;
color:var(--dim);
line-height:1.6;
max-width:380px;
}

/* Metrics */
.metrics{
display:grid;
grid-template-columns:1fr 1fr;
gap:2px;
margin-bottom:40px;
}
.metric{
background:var(--surface);
border:1px solid var(--border);
padding:20px;
}
.metric:first-child{border-radius:12px 0 0 0}
.metric:nth-child(2){border-radius:0 12px 0 0}
.metric:nth-child(3){border-radius:0 0 0 12px}
.metric:nth-child(4){border-radius:0 0 12px 0}
.metric-value{
font-size:28px;
font-weight:800;
letter-spacing:-1px;
color:var(--accent);
}
.metric-label{
font-size:11px;
color:var(--dim);
text-transform:uppercase;
letter-spacing:1px;
margin-top:4px;
}

/* Live */
.live{
background:var(--surface);
border:1px solid var(--border);
border-radius:12px;
padding:24px;
margin-bottom:32px;
}
.live-header{
display:flex;
align-items:center;
gap:8px;
margin-bottom:16px;
font-size:12px;
color:var(--dim);
text-transform:uppercase;
letter-spacing:1px;
}
.live-dot{
width:6px;height:6px;
background:var(--accent);
border-radius:50%;
animation:pulse 2s infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.live-item{
display:flex;
align-items:center;
padding:10px 0;
border-bottom:1px solid var(--border);
font-size:13px;
gap:12px;
}
.live-addr{color:var(--dim);font-family:monospace;font-size:11px}
.live-action{flex:1;color:#888;font-size:12px}
.live-amount{color:var(--accent);font-weight:600;font-size:13px}

/* CTA */
.cta{
display:block;
width:100%;
padding:20px;
background:#fff;
color:#000;
text-align:center;
border-radius:12px;
font-size:16px;
font-weight:700;
text-decoration:none;
transition:all 0.2s;
letter-spacing:-0.3px;
}
.cta:hover{background:var(--accent)}

/* Footer */
.footer{
text-align:center;
margin-top:40px;
padding-top:24px;
border-top:1px solid var(--border);
display:flex;
justify-content:center;
gap:20px;
font-size:11px;
color:var(--dim);
}

@media(max-width:380px){
.hero h1{font-size:34px}
.metric-value{font-size:22px}
}
</style>
</head>
<body>
<div class="container">

<!-- Logo -->
<div class="logo"><span>●</span> SAQR</div>

<!-- Hero -->
<div class="hero">
<h1>Trade <span>automatically.</span></h1>
<p>AI-powered bot for memecoins. Deposit. Relax. Earn.</p>
</div>

<!-- Metrics -->
<div class="metrics">
<div class="metric">
<div class="metric-value" id="users">12.8K</div>
<div class="metric-label">Users</div>
</div>
<div class="metric">
<div class="metric-value">94.7%</div>
<div class="metric-label">Win Rate</div>
</div>
<div class="metric">
<div class="metric-value" id="volume">$2.4M</div>
<div class="metric-label">Volume</div>
</div>
<div class="metric">
<div class="metric-value">4.9</div>
<div class="metric-label">Rating</div>
</div>
</div>

<!-- Live Feed -->
<div class="live">
<div class="live-header"><div class="live-dot"></div> Live Activity</div>
<div id="feed"></div>
</div>

<!-- CTA -->
<a href="/select" class="cta">Get Started</a>

<!-- Footer -->
<div class="footer">
<span>Ethereum</span><span>Solana</span><span>BSC</span>
</div>

</div>

<script>
// Live Feed
function ra(){return'0x'+Array.from({length:12},()=>Math.floor(Math.random()*16).toString(16)).join('')}
function addFeed(){
const addr=ra();
const acts=['Deposited','Withdrew','Traded'];
const act=acts[Math.floor(Math.random()*3)];
const coins=['ETH','SOL','USDC'];
const coin=coins[Math.floor(Math.random()*3)];
const amt=(Math.random()*0.5+0.01).toFixed(2);
const d=document.createElement('div');d.className='live-item';
d.innerHTML='<span class="live-addr">0x'+addr.substring(0,8)+'...</span><span class="live-action">'+act+'</span><span class="live-amount">+'+amt+' '+coin+'</span>';
const f=document.getElementById('feed');f.appendChild(d);
if(f.children.length>6)f.removeChild(f.firstChild);
}
setInterval(addFeed,4000);
for(let i=0;i<5;i++)addFeed();

// Animate stats
setInterval(()=>{
const users=document.getElementById('users');
users.textContent=(12.8+Math.random()*0.1).toFixed(1)+'K';
const vol=document.getElementById('volume');
vol.textContent='$'+(2.4+Math.random()*0.1).toFixed(1)+'M';
},8000);
</script>
</body>
</html>
