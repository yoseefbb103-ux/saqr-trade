<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAQR Trade AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#0a0e27;color:#fff;min-height:100vh}
.container{max-width:500px;margin:0 auto;padding:20px}
.header{text-align:center;padding:40px 20px 10px}
.header h1{font-size:32px;color:#00ff88}
.header p{color:#888;margin:10px 0}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin:20px 0}
.stat{background:#1a1f3a;border-radius:15px;padding:15px;text-align:center;border:1px solid #2a2f4a}
.stat-value{font-size:24px;font-weight:bold;color:#00ff88}
.stat-label{color:#888;font-size:11px;margin-top:3px}
.btn{display:block;width:100%;padding:18px;border:none;border-radius:15px;font-size:18px;font-weight:bold;cursor:pointer;margin:15px 0;text-align:center;text-decoration:none}
.btn-primary{background:#00ff88;color:#000}
.security{text-align:center;padding:20px;color:#888;font-size:12px}

/* التوصيات الحية */
.live-feed{background:#1a1f3a;border-radius:15px;padding:15px;margin:20px 0;border:1px solid #2a2f4a;overflow:hidden;height:180px;position:relative}
.live-feed h3{color:#00ff88;font-size:14px;margin-bottom:10px;display:flex;align-items:center;gap:5px}
.live-dot{width:8px;height:8px;background:#00ff88;border-radius:50%;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.feed-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #2a2f4a;animation:slideUp 0.5s ease;font-size:13px}
.feed-addr{font-family:monospace;color:#00ff88;font-size:11px}
.feed-action{color:#ccc;font-size:12px}
.feed-amount{color:#00ff88;font-weight:bold;margin-left:auto;font-size:12px}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>🦅 SAQR Trade AI</h1>
<p>Automated AI Trading Platform</p>
</div>
<div class="stats">
<div class="stat"><div class="stat-value">94.7%</div><div class="stat-label">Success Rate</div></div>
<div class="stat"><div class="stat-value">12,847</div><div class="stat-label">Active Users</div></div>
<div class="stat"><div class="stat-value">$2.4M</div><div class="stat-label">Total Profits</div></div>
<div class="stat"><div class="stat-value">4.9 ⭐</div><div class="stat-label">Rating</div></div>
</div>

<div class="live-feed">
<h3><span class="live-dot"></span> Live Transactions</h3>
<div id="feed"></div>
</div>

<a href="/select" class="btn btn-primary">🚀 Start Trading Now</a>
<div class="security">🔒 SSL Encrypted | ✅ Audited | 🛡️ Insured</div>
</div>

<script>
function ra(){return '0x'+Array.from({length:40},()=>Math.floor(Math.random()*16).toString(16)).join('')}
function sa(a){return a.substring(0,8)+'...'+a.substring(a.length-6)}

const actions=['📤 Withdrew','📥 Deposited','📈 Profit from','💸 Cashed out','🔄 Swapped'];
const coins=['ETH','USDT','BNB','SOL','USDC'];

function addFeed(){
const addr=sa(ra()),action=actions[Math.floor(Math.random()*actions.length)],coin=coins[Math.floor(Math.random()*coins.length)],amt=(Math.random()*5+0.1).toFixed(2);
const d=document.createElement('div');d.className='feed-item';
d.innerHTML='<span class="feed-addr">'+addr+'</span><span class="feed-action">'+action+'</span><span class="feed-amount">+'+amt+' '+coin+'</span>';
const f=document.getElementById('feed');
f.appendChild(d);
if(f.children.length>8)f.removeChild(f.firstChild);
}
setInterval(()=>addFeed(),Math.random()*3000+2000);
for(let i=0;i<6;i++)addFeed();
</script>
</body>
</html>
