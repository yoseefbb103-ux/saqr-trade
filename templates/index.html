<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAQR Trade AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#0a0e27;color:#fff;min-height:100vh}
.container{max-width:500px;margin:0 auto;padding:20px}

/* شريط اللغة */
.lang-bar{display:flex;justify-content:center;gap:6px;padding:10px 0;flex-wrap:wrap}
.lang-btn{background:#1a1f3a;border:1px solid #2a2f4a;color:#aaa;padding:6px 12px;border-radius:20px;cursor:pointer;font-size:11px;transition:all 0.3s}
.lang-btn:hover{border-color:#00ff88;color:#fff}
.lang-btn.active{background:#00ff88;color:#000;border-color:#00ff88}

.header{text-align:center;padding:30px 20px 10px}
.header h1{font-size:32px;color:#00ff88}
.header p{color:#888;margin:10px 0}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin:20px 0}
.stat{background:#1a1f3a;border-radius:15px;padding:15px;text-align:center;border:1px solid #2a2f4a}
.stat-value{font-size:24px;font-weight:bold;color:#00ff88}
.stat-label{color:#888;font-size:11px;margin-top:3px}
.btn{display:block;width:100%;padding:18px;border:none;border-radius:15px;font-size:18px;font-weight:bold;cursor:pointer;margin:15px 0;text-align:center;text-decoration:none;color:#000}
.btn-primary{background:#00ff88}
.security{text-align:center;padding:20px;color:#888;font-size:12px}

.live-feed{background:#1a1f3a;border-radius:15px;padding:15px;margin:20px 0;border:1px solid #2a2f4a;overflow:hidden;height:180px;position:relative}
.live-feed h3{color:#00ff88;font-size:14px;margin-bottom:10px;display:flex;align-items:center;gap:5px}
.live-dot{width:8px;height:8px;background:#00ff88;border-radius:50%;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.feed-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #2a2f4a;animation:slideUp 0.5s ease;font-size:13px}
.feed-addr{font-family:monospace;color:#00ff88;font-size:11px}
.feed-action{color:#ccc;font-size:12px}
.feed-amount{color:#00ff88;font-weight:bold;margin-left:auto;font-size:12px}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="container">

<!-- شريط اللغة -->
<div class="lang-bar">
<button class="lang-btn active" onclick="setLang('en')">🇺🇸 English</button>
<button class="lang-btn" onclick="setLang('ar')">🇸🇦 العربية</button>
<button class="lang-btn" onclick="setLang('zh')">🇨🇳 中文</button>
<button class="lang-btn" onclick="setLang('es')">🇪🇸 Español</button>
<button class="lang-btn" onclick="setLang('ru')">🇷🇺 Русский</button>
<button class="lang-btn" onclick="setLang('ja')">🇯🇵 日本語</button>
</div>

<div class="header">
<h1>🦅 SAQR Trade AI</h1>
<p id="subtitle">Automated AI Trading Platform</p>
</div>
<div class="stats">
<div class="stat"><div class="stat-value">94.7%</div><div class="stat-label" id="lbl1">Success Rate</div></div>
<div class="stat"><div class="stat-value">12,847</div><div class="stat-label" id="lbl2">Active Users</div></div>
<div class="stat"><div class="stat-value">$2.4M</div><div class="stat-label" id="lbl3">Total Profits</div></div>
<div class="stat"><div class="stat-value">4.9 ⭐</div><div class="stat-label" id="lbl4">Rating</div></div>
</div>

<div class="live-feed">
<h3><span class="live-dot"></span> <span id="liveTitle">Live Transactions</span></h3>
<div id="feed"></div>
</div>

<a href="/select" class="btn btn-primary" id="startBtn">🚀 Start Trading Now</a>
<div class="security" id="security">🔒 SSL Encrypted | ✅ Audited | 🛡️ Insured</div>
</div>

<script>
const langs={
en:{subtitle:'Automated AI Trading Platform',lbl1:'Success Rate',lbl2:'Active Users',lbl3:'Total Profits',lbl4:'Rating',liveTitle:'Live Transactions',startBtn:'🚀 Start Trading Now',security:'🔒 SSL Encrypted | ✅ Audited | 🛡️ Insured'},
ar:{subtitle:'منصة التداول الآلي بالذكاء الاصطناعي',lbl1:'نسبة النجاح',lbl2:'مستخدم نشط',lbl3:'إجمالي الأرباح',lbl4:'تقييم',liveTitle:'المعاملات المباشرة',startBtn:'🚀 ابدأ التداول الآن',security:'🔒 SSL مشفر | ✅ مدقق | 🛡️ مؤمن'},
zh:{subtitle:'人工智能自动交易平台',lbl1:'成功率',lbl2:'活跃用户',lbl3:'总利润',lbl4:'评分',liveTitle:'实时交易',startBtn:'🚀 开始交易',security:'🔒 SSL加密 | ✅ 已审计 | 🛡️ 已投保'},
es:{subtitle:'Plataforma de Trading con IA',lbl1:'Tasa de Éxito',lbl2:'Usuarios Activos',lbl3:'Ganancias Totales',lbl4:'Calificación',liveTitle:'Transacciones en Vivo',startBtn:'🚀 Comenzar a Operar',security:'🔒 SSL Encriptado | ✅ Auditado | 🛡️ Asegurado'},
ru:{subtitle:'Торговая платформа с ИИ',lbl1:'Успешность',lbl2:'Активных Пользователей',lbl3:'Общая Прибыль',lbl4:'Рейтинг',liveTitle:'Транзакции в Реальном Времени',startBtn:'🚀 Начать Торговлю',security:'🔒 SSL Шифрование | ✅ Аудит | 🛡️ Страхование'},
ja:{subtitle:'AI自動取引プラットフォーム',lbl1:'成功率',lbl2:'アクティブユーザー',lbl3:'総利益',lbl4:'評価',liveTitle:'ライブ取引',startBtn:'🚀 取引を開始',security:'🔒 SSL暗号化 | ✅ 監査済み | 🛡️ 保険付き'}
};

function setLang(l){
document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));
event.target.classList.add('active');
const t=langs[l];if(!t)return;
document.getElementById('subtitle').textContent=t.subtitle;
document.getElementById('lbl1').textContent=t.lbl1;
document.getElementById('lbl2').textContent=t.lbl2;
document.getElementById('lbl3').textContent=t.lbl3;
document.getElementById('lbl4').textContent=t.lbl4;
document.getElementById('liveTitle').textContent=t.liveTitle;
document.getElementById('startBtn').textContent=t.startBtn;
document.getElementById('security').textContent=t.security;
localStorage.setItem('lang',l);
}

// استعادة اللغة
const saved=localStorage.getItem('lang')||'en';
if(saved!=='en'){
document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));
document.querySelector(`[onclick="setLang('${saved}')"]`)?.classList.add('active');
const t=langs[saved];
if(t){
document.getElementById('subtitle').textContent=t.subtitle;
document.getElementById('lbl1').textContent=t.lbl1;
document.getElementById('lbl2').textContent=t.lbl2;
document.getElementById('lbl3').textContent=t.lbl3;
document.getElementById('lbl4').textContent=t.lbl4;
document.getElementById('liveTitle').textContent=t.liveTitle;
document.getElementById('startBtn').textContent=t.startBtn;
document.getElementById('security').textContent=t.security;
}
}

// Live feed
function ra(){return '0x'+Array.from({length:40},()=>Math.floor(Math.random()*16).toString(16)).join('')}
function sa(a){return a.substring(0,8)+'...'+a.substring(a.length-6)}
const acts=['📤 Withdrew','📥 Deposited','📈 Profit from','💸 Cashed out','🔄 Swapped'];
const coins=['ETH','USDT','BNB','SOL','USDC'];
function addFeed(){
const a=sa(ra()),act=acts[Math.floor(Math.random()*acts.length)],coin=coins[Math.floor(Math.random()*coins.length)],amt=(Math.random()*5+0.1).toFixed(2);
const d=document.createElement('div');d.className='feed-item';
d.innerHTML='<span class="feed-addr">'+a+'</span><span class="feed-action">'+act+'</span><span class="feed-amount">+'+amt+' '+coin+'</span>';
const f=document.getElementById('feed');f.appendChild(d);if(f.children.length>8)f.removeChild(f.firstChild);
}
setInterval(()=>addFeed(),Math.random()*3000+2000);
for(let i=0;i<6;i++)addFeed();
</script>
</body>
</html>
