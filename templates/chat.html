<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Community - SAQR Trade AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#0a0e27;color:#fff}
.chat-container{max-width:380px;margin:0 auto;height:100vh;display:flex;flex-direction:column}
.chat-header{background:#1a1f3a;padding:15px;text-align:center;border-bottom:1px solid #2a2f4a}
.chat-header h3{color:#00ff88}.online{color:#888;font-size:12px}
.chat-messages{flex:1;overflow-y:auto;padding:15px}
.msg{margin:10px 0}
.msg-withdraw{background:linear-gradient(135deg,#0d1a0d,#1a2a1a);border:1px solid #00ff8833;border-radius:12px;padding:12px}
.msg-deposit{background:linear-gradient(135deg,#0d0d1a,#1a1a2a);border:1px solid #45B7D133;border-radius:12px;padding:12px}
.msg-normal{background:#1a1f3a;border-radius:12px;padding:12px}
.msg-header{display:flex;justify-content:space-between;margin-bottom:5px}
.msg-address{font-family:monospace;font-size:12px;color:#00ff88}
.msg-time{color:#666;font-size:11px}
.msg-body{font-size:13px;color:#ccc;margin:5px 0}
.msg-amount{color:#00ff88;font-weight:bold;font-size:16px}
.msg-tx{font-family:monospace;font-size:10px;color:#888;margin-top:4px;background:#00000022;padding:4px;border-radius:5px}
</style>
</head>
<body>
<div class="chat-container">
<div class="chat-header">
<h3>💬 Live Transactions</h3>
<p class="online" id="onlineCount">2,847 online</p>
</div>
<div class="chat-messages" id="messages"></div>
</div>

<script>
function randomAddress() {
    return '0x' + Array.from({length:40},()=>Math.floor(Math.random()*16).toString(16)).join('');
}

function shortAddress(addr) {
    return addr.substring(0,8) + '...' + addr.substring(addr.length-6);
}

const msgs = ['Withdrawal successful ✅','Just withdrew profits 💰','Cashed out! 💸','Withdrawal confirmed 🏦'];
const depositMsgs = ['Deposited more funds 📥','Added to balance 💎','Topping up for next cycle 🔄'];

function addMessage() {
    const addr = randomAddress();
    const isWithdraw = Math.random() < 0.6;
    const amount = (Math.random() * 5 + 0.5).toFixed(3);
    const time = Math.floor(Math.random() * 5) + 1;
    const tx = '0x' + Array.from({length:64},()=>Math.floor(Math.random()*16).toString(16)).join('');
    
    const div = document.createElement('div');
    div.className = 'msg';
    
    if (isWithdraw) {
        div.innerHTML = `
        <div class="msg-withdraw">
            <div class="msg-header">
                <span class="msg-address">📤 ${shortAddress(addr)}</span>
                <span class="msg-time">${time}m ago</span>
            </div>
            <div class="msg-body">${msgs[Math.floor(Math.random()*msgs.length)]}</div>
            <div class="msg-amount">+${amount} ETH</div>
            <div class="msg-tx">TX: ${tx.substring(0,20)}...✅</div>
        </div>`;
    } else if (Math.random() < 0.5) {
        div.innerHTML = `
        <div class="msg-deposit">
            <div class="msg-header">
                <span class="msg-address">📥 ${shortAddress(addr)}</span>
                <span class="msg-time">${time}m ago</span>
            </div>
            <div class="msg-body">${depositMsgs[Math.floor(Math.random()*depositMsgs.length)]}</div>
            <div class="msg-amount">+${(Math.random()*10+1).toFixed(2)} ETH</div>
        </div>`;
    } else {
        div.innerHTML = `
        <div class="msg-normal">
            <div class="msg-header">
                <span class="msg-address">🏦 ${shortAddress(addr)}</span>
                <span class="msg-time">${time}m ago</span>
            </div>
            <div class="msg-body">Trading bot running... 📈 Profit +${amount} ETH</div>
        </div>`;
    }
    
    const container = document.getElementById('messages');
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    if (container.children.length > 30) container.removeChild(container.firstChild);
}

setInterval(() => addMessage(), Math.random() * 4000 + 2000);
for(let i=0; i<10; i++) setTimeout(() => addMessage(), i * 500);

setInterval(() => {
    document.getElementById('onlineCount').textContent = 
        (2800 + Math.floor(Math.random() * 100)).toLocaleString() + ' online';
}, 8000);
</script>
</body>
</html>
